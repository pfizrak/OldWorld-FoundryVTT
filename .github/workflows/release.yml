name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: get-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: npm ci && npm run release

      - name: Create ZIP
        run: cd build && zip -r ../whtow.zip *

      - name: Patch system.json URLs
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          jq --arg tag "$TAG" \
            '.download = "https://github.com/pfizrak/OldWorld-FoundryVTT/releases/download/\($tag)/whtow.zip"
           | .manifest = "https://github.com/pfizrak/OldWorld-FoundryVTT/releases/latest/download/system.json"' \
            system.json > system_patched.json
          mv system_patched.json system.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" whtow.zip system.json \
            --title "$TAG" \
            --generate-notes
